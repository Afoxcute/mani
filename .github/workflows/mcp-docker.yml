name: Build and Deploy Bonzo MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME_PROD }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN_PROD }}
  HOST: ${{ secrets.SSH_HOST_TEMP }}
  HOST_USERNAME: ${{ secrets.SSH_USERNAME_TEMP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_TEMP }}
  MCP_IMAGE: ${{ secrets.DOCKER_USERNAME_PROD }}/bonzo-mcp:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build MCP image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: false
          tags: bonzo-mcp:pr
          cache-from: type=gha,scope=bonzo-mcp
          cache-to: type=gha,mode=max,scope=bonzo-mcp

      - name: Build and push MCP image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ env.MCP_IMAGE }}
          cache-from: type=gha,scope=bonzo-mcp
          cache-to: type=gha,mode=max,scope=bonzo-mcp

      - name: Deploy to Ubuntu server
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            APP_DIR=/home/ubuntu/bottie
            MCP_ENV=$APP_DIR/.env.mcp

            if [ ! -f "$MCP_ENV" ]; then
              echo "ERROR: Missing MCP env file: $MCP_ENV"
              exit 1
            fi

            echo "Creating Docker network if missing..."
            sudo docker network create bottie-net >/dev/null 2>&1 || true

            echo "Logging into Docker Hub on the server..."
            echo "$DOCKER_PASSWORD" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "Stopping old container..."
            sudo docker stop bottie-mcp-server || true
            sudo docker rm bottie-mcp-server || true

            echo "Pulling latest image..."
            sudo docker pull ${{ env.MCP_IMAGE }}

            echo "Starting MCP server..."
            sudo docker run -d \
              --name bottie-mcp-server \
              --restart unless-stopped \
              --network bottie-net \
              -p 3001:3001 \
              --env-file "$MCP_ENV" \
              ${{ env.MCP_IMAGE }}

            echo "Verifying deployment..."
            sleep 10

            if ! sudo docker ps --format '{{.Names}}' | grep -q '^bottie-mcp-server$'; then
              echo "ERROR: MCP container failed to start"
              sudo docker logs bottie-mcp-server || true
              exit 1
            fi

            echo "OK: MCP container is running"
            echo "MCP logs:"
            sudo docker logs --tail 30 bottie-mcp-server
            echo "Deployment completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Post-deploy verification
        if: github.event_name == 'push' && success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            if sudo docker ps --format '{{.Names}}' | grep -q '^bottie-mcp-server$'; then
              echo "MCP container status:"
              sudo docker inspect bottie-mcp-server --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}'
              sudo docker port bottie-mcp-server
            else
              echo "ERROR: bottie-mcp-server is not running"
              exit 1
            fi
