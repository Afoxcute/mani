name: Build and Deploy Mani Web + MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  HOST: ${{ secrets.SSH_HOST_TEMP }}
  HOST_USERNAME: ${{ secrets.SSH_USERNAME_TEMP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_TEMP }}
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME_PROD }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN_PROD }}
  WEB_REOWN_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID_PROD || 'placeholder-reown-project-id' }}
  WEB_FACILITATOR_URL: ${{ secrets.NEXT_PUBLIC_X402_FACILITATOR_URL_PROD || 'http://localhost:3002' }}
  WEB_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL_PROD || 'http://localhost:3000' }}
  WEB_MCP_URL: ${{ secrets.NEXT_PUBLIC_MCP_URL_PROD || 'http://localhost:3001' }}
  WEB_AGENT_DELEGATOR_ADDRESS: ${{ secrets.NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS_PROD || '0x3A9AB777B438d78059D1735c3ec30e6c94Ea35a1' }}
  WEB_ACTION_ROUTER_ADDRESS: ${{ secrets.NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS_PROD || '0x288dA822f469B9e11818dB9Fa6EC74e57230342a' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="${{ env.WEB_REOWN_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="${{ env.WEB_FACILITATOR_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.WEB_APP_URL }}" \
            --build-arg NEXT_PUBLIC_MCP_URL="${{ env.WEB_MCP_URL }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="${{ env.WEB_AGENT_DELEGATOR_ADDRESS }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="${{ env.WEB_ACTION_ROUTER_ADDRESS }}" \
            -t mani-web:pr \
            .

      - name: Build MCP image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f Dockerfile.mcp \
            -t mani-mcp:pr \
            .

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build web image
        if: github.event_name == 'push'
        run: |
          OWNER="$(printf '%s' "${{ env.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')"
          WEB_IMAGE="docker.io/$OWNER/mani-web:latest"
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="${{ env.WEB_REOWN_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="${{ env.WEB_FACILITATOR_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.WEB_APP_URL }}" \
            --build-arg NEXT_PUBLIC_MCP_URL="${{ env.WEB_MCP_URL }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="${{ env.WEB_AGENT_DELEGATOR_ADDRESS }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="${{ env.WEB_ACTION_ROUTER_ADDRESS }}" \
            -t "$WEB_IMAGE" \
            .

      - name: Build MCP image
        if: github.event_name == 'push'
        run: |
          OWNER="$(printf '%s' "${{ env.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')"
          MCP_IMAGE="docker.io/$OWNER/mani-mcp:latest"
          docker build \
            -f Dockerfile.mcp \
            -t "$MCP_IMAGE" \
            .

      - name: Push images to Docker Hub
        if: github.event_name == 'push'
        run: |
          OWNER="$(printf '%s' "${{ env.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')"
          WEB_IMAGE="docker.io/$OWNER/mani-web:latest"
          MCP_IMAGE="docker.io/$OWNER/mani-mcp:latest"
          docker push "$WEB_IMAGE"
          docker push "$MCP_IMAGE"

      - name: Prepare SSH key for deploy
        if: github.event_name == 'push'
        run: |
          install -m 600 /dev/null /tmp/mani_deploy_key
          printf '%s\n' "${{ env.SSH_PRIVATE_KEY }}" > /tmp/mani_deploy_key

      - name: Deploy to Ubuntu server
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          echo "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          SSH_OPTS="-i /tmp/mani_deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes"
          OWNER="$(printf '%s' "${{ env.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')"
          WEB_IMAGE="docker.io/$OWNER/mani-web:latest"
          MCP_IMAGE="docker.io/$OWNER/mani-mcp:latest"

          ssh $SSH_OPTS "${HOST_USERNAME}@${HOST}" "WEB_IMAGE='$WEB_IMAGE' MCP_IMAGE='$MCP_IMAGE' DOCKER_USERNAME='${{ env.DOCKER_USERNAME }}' DOCKER_PASSWORD='${{ env.DOCKER_PASSWORD }}' bash -se" <<'REMOTE'
          set -euo pipefail

          APP_DIR=/home/ubuntu/bottie
          CONFIG_DIR="$APP_DIR/config"
          WEB_ENV="$CONFIG_DIR/.env.web"
          MCP_ENV="$CONFIG_DIR/.env.mcp"
          LOG_FILE="$CONFIG_DIR/deploy.log"
          STATUS_FILE="$CONFIG_DIR/deploy.status"

          mkdir -p "$CONFIG_DIR"
          : > "$LOG_FILE"
          rm -f "$STATUS_FILE"

          log() {
            echo "$*" | tee -a "$LOG_FILE"
          }

          fail() {
            log "ERROR: $*"
            echo "failed" > "$STATUS_FILE"
            exit 1
          }

          trap 'fail "Deployment script crashed at line $LINENO"' ERR

          log "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          [ -f "$WEB_ENV" ] || fail "Missing web env file: $WEB_ENV"
          [ -f "$MCP_ENV" ] || fail "Missing MCP env file: $MCP_ENV"

          log "Creating Docker network if missing..."
          sudo docker network create mani-net >/dev/null 2>&1 || true

          log "Logging in to Docker Hub on the server..."
          printf '%s\n' "$DOCKER_PASSWORD" | sudo docker login --username "$DOCKER_USERNAME" --password-stdin docker.io

          log "Pulling images from Docker Hub..."
          sudo docker pull "$WEB_IMAGE"
          sudo docker pull "$MCP_IMAGE"

          log "Stopping old containers..."
          stop_port_containers() {
            local port="$1"
            local ids
            ids=$(sudo docker ps --filter "publish=$port" --format '{{.ID}}')
            if [ -n "$ids" ]; then
              log "Stopping containers publishing port $port: $ids"
              sudo docker stop $ids || true
              sudo docker rm $ids || true
            fi
          }

          stop_named_container() {
            local name="$1"
            if sudo docker ps -a --format '{{.Names}}' | grep -q "^${name}$"; then
              sudo docker stop "$name" || true
              sudo docker rm "$name" || true
            fi
          }

          stop_port_containers 3000
          stop_port_containers 3001
          stop_named_container mani-web
          stop_named_container mani-mcp

          log "Starting MCP server..."
          sudo docker run -d \
            --name mani-mcp \
            --restart unless-stopped \
            --network mani-net \
            -p 3001:3001 \
            --env-file "$MCP_ENV" \
            "$MCP_IMAGE"

          log "Starting web app..."
          sudo docker run -d \
            --name mani-web \
            --restart unless-stopped \
            --network mani-net \
            -p 3000:3000 \
            --env-file "$WEB_ENV" \
            "$WEB_IMAGE"

          log "Verifying deployment..."
          sleep 10

          if ! sudo docker ps --format '{{.Names}}' | grep -q '^mani-mcp$'; then
            sudo docker logs mani-mcp || true
            fail "mani-mcp container failed to start"
          fi

          if ! sudo docker ps --format '{{.Names}}' | grep -q '^mani-web$'; then
            sudo docker logs mani-web || true
            fail "mani-web container failed to start"
          fi

          log "OK: both containers are running"
          log "MCP logs:"
          sudo docker logs --tail 30 mani-mcp | tee -a "$LOG_FILE"
          log "Web logs:"
          sudo docker logs --tail 30 mani-web | tee -a "$LOG_FILE"
          log "Deployment completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "success" > "$STATUS_FILE"
          REMOTE

          echo "Deployment logs:"
          ssh $SSH_OPTS "${HOST_USERNAME}@${HOST}" 'tail -n 60 /home/ubuntu/bottie/config/deploy.log || true'
