name: Build and Deploy Mani Web + MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  HOST: ${{ secrets.SSH_HOST_TEMP }}
  HOST_USERNAME: ${{ secrets.SSH_USERNAME_TEMP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_TEMP }}
  WEB_REOWN_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID_PROD || 'placeholder-reown-project-id' }}
  WEB_FACILITATOR_URL: ${{ secrets.NEXT_PUBLIC_X402_FACILITATOR_URL_PROD || 'http://localhost:3002' }}
  WEB_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL_PROD || 'http://localhost:3000' }}
  WEB_MCP_URL: ${{ secrets.NEXT_PUBLIC_MCP_URL_PROD || 'http://localhost:3001' }}
  WEB_AGENT_DELEGATOR_ADDRESS: ${{ secrets.NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS_PROD || '0x3A9AB777B438d78059D1735c3ec30e6c94Ea35a1' }}
  WEB_ACTION_ROUTER_ADDRESS: ${{ secrets.NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS_PROD || '0x288dA822f469B9e11818dB9fA6EC74e57230342a' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build web image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="${{ env.WEB_REOWN_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="${{ env.WEB_FACILITATOR_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.WEB_APP_URL }}" \
            --build-arg NEXT_PUBLIC_MCP_URL="${{ env.WEB_MCP_URL }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="${{ env.WEB_AGENT_DELEGATOR_ADDRESS }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="${{ env.WEB_ACTION_ROUTER_ADDRESS }}" \
            -t mani-web:pr \
            .

      - name: Build MCP image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f Dockerfile.mcp \
            -t mani-mcp:pr \
            .

      - name: Build web image (push validation)
        if: github.event_name == 'push'
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="${{ env.WEB_REOWN_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="${{ env.WEB_FACILITATOR_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.WEB_APP_URL }}" \
            --build-arg NEXT_PUBLIC_MCP_URL="${{ env.WEB_MCP_URL }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="${{ env.WEB_AGENT_DELEGATOR_ADDRESS }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="${{ env.WEB_ACTION_ROUTER_ADDRESS }}" \
            -t mani-web:ci \
            .

      - name: Build MCP image (push validation)
        if: github.event_name == 'push'
        run: |
          docker build \
            -f Dockerfile.mcp \
            -t mani-mcp:ci \
            .

      - name: Prepare SSH key for sync
        if: github.event_name == 'push'
        run: |
          install -m 600 /dev/null /tmp/mani_deploy_key
          printf '%s\n' "${{ env.SSH_PRIVATE_KEY }}" > /tmp/mani_deploy_key

      - name: Sync source to Ubuntu server
        if: github.event_name == 'push'
        run: |
          ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no ${{ env.HOST_USERNAME }}@${{ env.HOST }} "mkdir -p /home/ubuntu/bottie/repo /home/ubuntu/bottie/config"
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '**/.env' \
            --exclude '**/.env.*' \
            --exclude '.git/' \
            --exclude '.git/**' \
            --exclude 'node_modules/' \
            --exclude '**/node_modules/' \
            --exclude '.next/' \
            --exclude '**/.next/' \
            --exclude 'dist/' \
            --exclude '**/dist/' \
            --exclude '.turbo/' \
            --exclude '**/.turbo/' \
            --exclude 'coverage/' \
            --exclude '**/coverage/' \
            --rsh="ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ env.HOST_USERNAME }}@${{ env.HOST }}:/home/ubuntu/bottie/repo/

      - name: Deploy to Ubuntu server
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          echo "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" "mkdir -p /home/ubuntu/bottie/config /home/ubuntu/bottie/repo"
          ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" "chmod +x /home/ubuntu/bottie/repo/scripts/remote-deploy.sh && nohup /home/ubuntu/bottie/repo/scripts/remote-deploy.sh >/dev/null 2>&1 & echo \$! > /home/ubuntu/bottie/config/deploy.pid"

          echo "Waiting for remote deployment to finish..."
          status=""
          for i in $(seq 1 240); do
            status="$(ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" "cat /home/ubuntu/bottie/config/deploy.status 2>/dev/null || true")"
            if [ "$status" = "success" ]; then
              echo "Remote deployment completed successfully."
              break
            fi
            if [ "$status" = "failed" ]; then
              echo "Remote deployment failed. Last log lines:"
              ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" "tail -n 120 /home/ubuntu/bottie/config/deploy.log || true"
              exit 1
            fi
            sleep 10
          done

          if [ "$status" != "success" ]; then
            echo "Remote deployment timed out. Last log lines:"
            ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" "tail -n 120 /home/ubuntu/bottie/config/deploy.log || true"
            exit 1
          fi

          echo "Deployment logs:"
          ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" "tail -n 60 /home/ubuntu/bottie/config/deploy.log || true"

      - name: Post-deploy verification
        if: github.event_name == 'push' && success()
        run: |
          set -euo pipefail
          ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no "${HOST_USERNAME}@${HOST}" 'bash -s' <<'REMOTE'
          set -e
          echo "MCP container status:"
          sudo docker inspect mani-mcp --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}' || true
          sudo docker port mani-mcp || true
          echo "Web container status:"
          sudo docker inspect mani-web --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}' || true
          sudo docker port mani-web || true
          REMOTE
