name: Build and Deploy Mani Web + MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  HOST: ${{ secrets.SSH_HOST_TEMP }}
  HOST_USERNAME: ${{ secrets.SSH_USERNAME_TEMP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_TEMP }}
  WEB_REOWN_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID_PROD || 'placeholder-reown-project-id' }}
  WEB_FACILITATOR_URL: ${{ secrets.NEXT_PUBLIC_X402_FACILITATOR_URL_PROD || 'http://localhost:3002' }}
  WEB_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL_PROD || 'http://localhost:3000' }}
  WEB_MCP_URL: ${{ secrets.NEXT_PUBLIC_MCP_URL_PROD || 'http://localhost:3001' }}
  WEB_AGENT_DELEGATOR_ADDRESS: ${{ secrets.NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS_PROD || '0x3A9AB777B438d78059D1735c3ec30e6c94Ea35a1' }}
  WEB_ACTION_ROUTER_ADDRESS: ${{ secrets.NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS_PROD || '0x288dA822f469B9e11818dB9fA6EC74e57230342a' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build web image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="${{ env.WEB_REOWN_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="${{ env.WEB_FACILITATOR_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.WEB_APP_URL }}" \
            --build-arg NEXT_PUBLIC_MCP_URL="${{ env.WEB_MCP_URL }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="${{ env.WEB_AGENT_DELEGATOR_ADDRESS }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="${{ env.WEB_ACTION_ROUTER_ADDRESS }}" \
            -t mani-web:pr \
            .

      - name: Build MCP image (PR validation)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            -f Dockerfile.mcp \
            -t mani-mcp:pr \
            .

      - name: Build web image (push validation)
        if: github.event_name == 'push'
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="${{ env.WEB_REOWN_PROJECT_ID }}" \
            --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="${{ env.WEB_FACILITATOR_URL }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ env.WEB_APP_URL }}" \
            --build-arg NEXT_PUBLIC_MCP_URL="${{ env.WEB_MCP_URL }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="${{ env.WEB_AGENT_DELEGATOR_ADDRESS }}" \
            --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="${{ env.WEB_ACTION_ROUTER_ADDRESS }}" \
            -t mani-web:ci \
            .

      - name: Build MCP image (push validation)
        if: github.event_name == 'push'
        run: |
          docker build \
            -f Dockerfile.mcp \
            -t mani-mcp:ci \
            .

      - name: Prepare SSH key for sync
        if: github.event_name == 'push'
        run: |
          install -m 600 /dev/null /tmp/mani_deploy_key
          printf '%s\n' "${{ env.SSH_PRIVATE_KEY }}" > /tmp/mani_deploy_key

      - name: Sync source to Ubuntu server
        if: github.event_name == 'push'
        run: |
          ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no ${{ env.HOST_USERNAME }}@${{ env.HOST }} "mkdir -p /home/ubuntu/bottie"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.git/**' \
            --exclude 'node_modules/' \
            --exclude '**/node_modules/' \
            --exclude '.next/' \
            --exclude '**/.next/' \
            --exclude 'dist/' \
            --exclude '**/dist/' \
            --exclude '.turbo/' \
            --exclude '**/.turbo/' \
            --exclude 'coverage/' \
            --exclude '**/coverage/' \
            --rsh="ssh -i /tmp/mani_deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ env.HOST_USERNAME }}@${{ env.HOST }}:/home/ubuntu/bottie/

      - name: Deploy to Ubuntu server
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "Deployment started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            APP_DIR=/home/ubuntu/bottie
            WEB_ENV=$APP_DIR/.env.web
            MCP_ENV=$APP_DIR/.env.mcp

            if [ ! -f "$WEB_ENV" ]; then
              echo "ERROR: Missing web env file: $WEB_ENV"
              exit 1
            fi

            if [ ! -f "$MCP_ENV" ]; then
              echo "ERROR: Missing MCP env file: $MCP_ENV"
              exit 1
            fi

            echo "Creating Docker network if missing..."
            sudo docker network create mani-net >/dev/null 2>&1 || true

            echo "Current Docker disk usage before cleanup:"
            sudo docker system df || true

            echo "Pruning unused Docker resources to free space..."
            sudo docker container prune -f || true
            sudo docker image prune -af || true
            sudo docker builder prune -af || true
            sudo docker volume prune -f || true

            echo "Docker disk usage after cleanup:"
            sudo docker system df || true

            echo "Loading web env for build-time public variables..."
            set -a
            . "$WEB_ENV"
            set +a

            echo "Building web image on the server..."
            sudo docker build \
              -f "$APP_DIR/Dockerfile.web" \
              --build-arg NEXT_PUBLIC_REOWN_PROJECT_ID="$NEXT_PUBLIC_REOWN_PROJECT_ID" \
              --build-arg NEXT_PUBLIC_X402_FACILITATOR_URL="$NEXT_PUBLIC_X402_FACILITATOR_URL" \
              --build-arg NEXT_PUBLIC_APP_URL="$NEXT_PUBLIC_APP_URL" \
              --build-arg NEXT_PUBLIC_MCP_URL="$NEXT_PUBLIC_MCP_URL" \
              --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_CHAIN_ID=5003 \
              --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS="$NEXT_PUBLIC_MANTLE_SEPOLIA_AGENT_DELEGATOR_ADDRESS" \
              --build-arg NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS="$NEXT_PUBLIC_MANTLE_SEPOLIA_ACTION_ROUTER_ADDRESS" \
              -t mani-web:latest \
              "$APP_DIR"

            echo "Building MCP image on the server..."
            sudo docker build \
              -f "$APP_DIR/Dockerfile.mcp" \
              -t mani-mcp:latest \
              "$APP_DIR"

            echo "Stopping old containers..."
            stop_port_containers() {
              local port="$1"
              local ids
              ids=$(sudo docker ps --filter "publish=$port" --format '{{.ID}}')
              if [ -n "$ids" ]; then
                echo "Stopping containers publishing port $port: $ids"
                sudo docker stop $ids || true
                sudo docker rm $ids || true
              fi
            }

            stop_named_container() {
              local name="$1"
              if sudo docker ps -a --format '{{.Names}}' | grep -q "^${name}$"; then
                sudo docker stop "$name" || true
                sudo docker rm "$name" || true
              fi
            }

            stop_port_containers 3000
            stop_port_containers 3001
            stop_named_container mani-web
            stop_named_container mani-mcp

            echo "Starting MCP server..."
            sudo docker run -d \
              --name mani-mcp \
              --restart unless-stopped \
              --network mani-net \
              -p 3001:3001 \
              --env-file "$MCP_ENV" \
              mani-mcp:latest

            echo "Starting web app..."
            sudo docker run -d \
              --name mani-web \
              --restart unless-stopped \
              --network mani-net \
              -p 3000:3000 \
              --env-file "$WEB_ENV" \
              mani-web:latest

            echo "Verifying deployment..."
            sleep 10

            if ! sudo docker ps --format '{{.Names}}' | grep -q '^mani-mcp$'; then
              echo "ERROR: mani-mcp container failed to start"
              sudo docker logs mani-mcp || true
              exit 1
            fi

            if ! sudo docker ps --format '{{.Names}}' | grep -q '^mani-web$'; then
              echo "ERROR: mani-web container failed to start"
              sudo docker logs mani-web || true
              exit 1
            fi

            echo "OK: both containers are running"
            echo "MCP logs:"
            sudo docker logs --tail 30 mani-mcp
            echo "Web logs:"
            sudo docker logs --tail 30 mani-web
            echo "Deployment completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Post-deploy verification
        if: github.event_name == 'push' && success()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.HOST }}
          username: ${{ env.HOST_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "MCP container status:"
            sudo docker inspect mani-mcp --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}' || true
            sudo docker port mani-mcp || true
            echo "Web container status:"
            sudo docker inspect mani-web --format='Status: {{.State.Status}} | Started At: {{.State.StartedAt}}' || true
            sudo docker port mani-web || true
